# sim-cli — COMSOL Multiphysics driver compatibility matrix.
#
# COMSOL has a real Python binding via the third-party `mph` package on PyPI.
# `mph` wraps COMSOL's Java API (talks to comsolmphserver via JPype under
# the hood) and exposes a clean `Client` / `Model` interface.
#
# Profile naming: comsol_<major><minor>_mph_<X>
#   - <major><minor>: COMSOL version short form (6.4 → "64")
#   - mph_<X>: mph major version line (1.x → "1")
#
# Detection inputs (see driver.py detect_installed):
#   - COMSOL_ROOT env var
#   - C:\Program Files\COMSOL\COMSOL<NN>\Multiphysics\         (Windows default)
#   - C:\Program Files (x86)\COMSOL64\Multiphysics\            (legacy x86 path)
#   - /usr/local/comsol<NN>\multiphysics\                      (Linux default)
#   - readme.txt first line carries the full version ("COMSOL 6.4.0.293 README")

driver: comsol
sdk_package: mph

profiles:

  - name: comsol_64_mph_1
    sdk: ">=1.2,<2.0"
    solver_versions: ["6.4"]
    active_solver_layer: "6.4"
    notes: |
      COMSOL 6.4 + mph 1.2.x. Latest tested as of 2026 Q1.

  - name: comsol_62_mph_1
    sdk: ">=1.2,<2.0"
    solver_versions: ["6.2"]
    active_solver_layer: "6.2"
    notes: |
      COMSOL 6.2 + mph 1.2.x.

  - name: comsol_61_mph_1
    sdk: ">=1.2,<2.0"
    solver_versions: ["6.1"]
    active_solver_layer: "6.1"
    notes: |
      COMSOL 6.1 + mph 1.2.x.

  - name: comsol_60_mph_1
    sdk: ">=1.2,<2.0"
    solver_versions: ["6.0"]
    active_solver_layer: "6.0"
    notes: |
      COMSOL 6.0 + mph 1.2.x.
